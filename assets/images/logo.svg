<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <!-- Background matching website -->
  <rect width="600" height="700" fill="transparent"/>

  <!-- Interlocking Triangle Logo -->
  <g transform="translate(300, 250)">
    <!-- Top Triangle - pointing up -->
    <path d="M 0,-160 L -30,-110 L -90,-110 L 0,-200 L 90,-110 L 30,-110 Z"
          fill="#c9b896"
          stroke="none"/>

    <!-- Top Triangle inner cutout -->
    <path d="M 0,-140 L -20,-105 L 20,-105 Z"
          fill="#2d3142"
          stroke="none"/>

    <!-- Bottom Left Triangle -->
    <path d="M -150,90 L -120,40 L -60,40 L -90,90 L -30,90 L -90,180 Z"
          fill="#c9b896"
          stroke="none"/>

    <!-- Bottom Left inner cutout -->
    <path d="M -90,70 L -75,50 L -105,50 Z"
          fill="#2d3142"
          stroke="none"/>

    <!-- Bottom Right Triangle -->
    <path d="M 150,90 L 120,40 L 60,40 L 90,90 L 30,90 L 90,180 Z"
          fill="#c9b896"
          stroke="none"/>

    <!-- Bottom Right inner cutout -->
    <path d="M 90,70 L 75,50 L 105,50 Z"
          fill="#2d3142"
          stroke="none"/>

    <!-- Center connecting elements -->
    <path d="M -30,-110 L -60,40 L 0,40 L 0,-110 Z"
          fill="#c9b896"
          stroke="none"/>

    <path d="M 30,-110 L 60,40 L 0,40 L 0,-110 Z"
          fill="#c9b896"
          stroke="none"/>

    <!-- Center triangle -->
    <path d="M 0,-20 L -35,40 L 35,40 Z"
          fill="#2d3142"
          stroke="none"/>
  </g>

  <!-- SayeOS Text -->
  <text x="300" y="550"
        font-family="serif"
        font-size="80"
        fill="#a8b2c1"
        text-anchor="middle"
        letter-spacing="4">SayeOS</text>
</svg>

